---
- name: Configure Windows network interface with DHCP
  hosts: "{{ s_hosts | default('all') }}"
  gather_facts: false

  vars:
    # WinRM connection settings
    ansible_connection: winrm
    ansible_port: 5986
    ansible_winrm_transport: ntlm
    ansible_winrm_server_cert_validation: ignore
    ansible_user: "{{ windows_admin_user | default('Administrator') }}"
    ansible_password: "{{ windows_admin_password }}"

    # Network interface configuration
    network_interface_name: "Ethernet0"
    network_interface_use_dhcp: true

  roles:
    - network_interface

  post_tasks:
    - name: Wait for DHCP to assign IP address
      ansible.windows.win_shell: |
        Start-Sleep -Seconds 5
        $ip = Get-NetIPAddress -InterfaceAlias "{{ network_interface_name }}" -AddressFamily IPv4 | Select-Object -ExpandProperty IPAddress
        if ($ip) { return "IP assigned: $ip" } else { throw "No IP address assigned" }
      register: dhcp_wait
      retries: 3
      delay: 5
      until: dhcp_wait.rc == 0
      changed_when: false

    - name: Display DHCP result
      ansible.builtin.debug:
        msg: "{{ dhcp_wait.stdout | trim }}"
