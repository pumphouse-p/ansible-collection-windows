---
# Default installer is SQL Server 2019 Developer edition
sqlserver_installer_url: "https://go.microsoft.com/fwlink/p/?linkid=866662"

# Path to download setup files to
sqlserver_download_path: "C:\\tmp"

# Installation path
sqlserver_install_path: "C:\\SQLServer"

# SQL Server instance configuration
sqlserver_instance_name: DefaultDB
sqlserver_drive: C
sqlserver_port: 1433

# Paths
sqlserver_userdb_path: "{{ sqlserver_drive }}:\\{{ sqlserver_instance_name }}"
sqlserver_userdb_accesspath: "{{ sqlserver_userdb_path }}\\DatabaseFiles"
sqlserver_userdb_logpath: "{{ sqlserver_userdb_path }}\\DatabaseLogs"

sqlserver_install_shared_dir: "C:\\Program Files\\Microsoft SQL Server"
sqlserver_install_sharedwow_dir: "C:\\Program Files (x86)\\Microsoft SQL Server"

sqlserver_instance_dir: "C:\\Program Files\\Microsoft SQL Server\\{{ sqlserver_instance_name }}"

sqlserver_install_sql_data_dir: "{{ sqlserver_userdb_accesspath }}\\{{ sqlserver_instance_name }}"

sqlserver_userdb_dir: "{{ sqlserver_userdb_accesspath }}\\{{ sqlserver_instance_name }}"

sqlserver_userdb_log_dir: "{{ sqlserver_userdb_logpath }}\\{{ sqlserver_instance_name }}"

sqlserver_tempdb_dir: "C:\\TempDBFiles\\Data\\{{ sqlserver_instance_name }}"

sqlserver_tempdb_log_dir: "C:\\TempDBFiles\\Logs\\{{ sqlserver_instance_name }}"

sqlserver_features: "SQLENGINE,FULLTEXT,CONN"

sqlserver_collation: "SQL_Latin1_General_CP1_CI_AS"

sqlserver_startup_type: "Automatic"

sqlserver_sysadmin_accounts: "ansible"

# Suppress reboots
sqlserver_suppress_reboot: false